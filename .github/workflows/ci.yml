name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required project files
        run: |
          test -f login.html
          test -f index.html
          test -f firebase.json
          test -f firestore.rules
          test -f firestore.indexes.json

      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'));"
          node -e "JSON.parse(require('fs').readFileSync('firebase.json','utf8'));"
          node -e "JSON.parse(require('fs').readFileSync('firestore.indexes.json','utf8'));"
          node -e "JSON.parse(require('fs').readFileSync('.firebaserc','utf8'));"

      - name: Security sanity check
        run: |
          if grep -R --line-number "AIza[0-9A-Za-z_-]\{35\}" js/firebase-config.js; then
            echo "Warning: Firebase API key found in frontend config (expected for web apps)."
          fi
